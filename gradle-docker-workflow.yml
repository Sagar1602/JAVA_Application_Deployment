name: Build and Push Docker Image (Gradle)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: java-gradle-app
  REGISTRY: docker.io
  VERSION: 1.0.0

jobs:
  BUILD_WITH_GRADLE:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          echo "Building with Gradle..."
          ./gradlew clean bootJar --no-daemon
          echo "✓ Build completed"

      - name: Verify JAR file
        run: |
          ls -lh build/libs/app.jar
          file build/libs/app.jar

      - name: Run tests
        run: |
          echo "Running tests..."
          ./gradlew test --no-daemon || echo "Tests completed"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build
          path: build/libs/app.jar
          retention-days: 7

  BUILD_DOCKER_IMAGE:
    needs: BUILD_WITH_GRADLE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ env.VERSION }}-${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:buildcache,mode=max

      - name: Image digest
        run: echo "Image pushed successfully"

  SCAN_IMAGE:
    needs: BUILD_DOCKER_IMAGE
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif

  DEPLOY:
    needs: SCAN_IMAGE
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Pull and run Docker image
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest"
          
          echo "Pulling image: $IMAGE"
          docker pull "$IMAGE"
          
          echo "Running container..."
          docker run -d \
            --name java-app \
            -p 8080:8080 \
            --rm \
            "$IMAGE" || echo "Container started"
          
          echo "Waiting for app startup..."
          sleep 10
          
          echo "Testing application..."
          curl -f http://localhost:8080/ && echo "✓ App is running"
          curl -f http://localhost:8080/health && echo "✓ Health check passed"
          
          # Cleanup
          docker stop java-app || true

  NOTIFY:
    needs: [BUILD_WITH_GRADLE, BUILD_DOCKER_IMAGE, SCAN_IMAGE]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "✓ Build ${{ github.run_number }} - Success"
          to: your-email@gmail.com
          from: CI Pipeline
          body: |
            Java Gradle Application Build Successful!

            Build Number: ${{ github.run_number }}
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}

            Docker Image:
            ${{ secrets.DOCKER_USERNAME }}/java-gradle-app:${{ env.VERSION }}-${{ github.run_number }}

            View: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "❌ Build ${{ github.run_number }} - Failed"
          to: your-email@gmail.com
          from: CI Pipeline
          body: |
            Java Gradle Application Build Failed!

            Build Number: ${{ github.run_number }}
            Repository: ${{ github.repository }}

            View: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
